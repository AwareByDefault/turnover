name: CI

# Backstop gate on every PR (and pushes to main): require a changeset so release
# impact is always declared, lint + typecheck the tree, verify the published
# build compiles, run the unit tests, and audit dependencies. These are the
# checks the "Protect main" ruleset requires before a PR can merge.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

# A new push to a PR cancels any in-flight run for that ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Every PR must declare its release impact with a Changeset (versioning is
  # decoupled from commit messages). Add one with `bun run changeset` (patch/
  # minor/major + description), or `bun run changeset --empty` for a no-release
  # change. See contributing/releasing.md.
  changeset:
    name: Changeset present
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require a changeset in this PR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "$BASE_SHA" HEAD -- '.changeset/*.md' ':!.changeset/README.md' || true)"
          if [ -z "$changed" ]; then
            echo "::error::No changeset found. Run 'bun run changeset' to declare this PR's release impact (patch/minor/major + a description), or 'bun run changeset --empty' for a no-release change. See contributing/releasing.md."
            exit 1
          fi
          echo "Changeset(s) in this PR:"
          echo "$changed"

  # `lint` (not `lint:fix`) is the verification form — CI must fail on
  # unformatted/unlinted code rather than silently fixing it.
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun test

  # Dependency vulnerability gate. Blocks on high/critical advisories only
  # (`--audit-level=high`) so a moderate/low advisory in a transitive dep can't
  # wedge unrelated PRs; Dependabot (.github/dependabot.yml) handles routine bumps.
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun audit --audit-level=high
